services:
  proxy:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "3001:3001"
    command: node api/dev-server.js
    env_file: .env

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
      - frontend_nm:/app/frontend/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - proxy
    environment:
      - PROXY_TARGET=http://proxy:3001
    command: sh -c "npm install && npm run dev"

volumes:
  frontend_nm:
